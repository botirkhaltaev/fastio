name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.rust }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, "1.93"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Test default features
        run: cargo test --all-targets

      - name: Test no default features
        run: cargo test --no-default-features --all-targets

      - name: Test Tokio without Rayon
        run: cargo test --no-default-features --features tokio --all-targets

      - name: Test all features
        run: cargo test --all-features

      - name: Clippy all features
        run: cargo clippy --all-targets --all-features -- -D warnings

  feature-test-matrix:
    name: ${{ matrix.os }} / ${{ matrix.feature }} feature tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            feature: sync
          - os: ubuntu-latest
            feature: tokio
          - os: ubuntu-latest
            feature: mmap
          - os: ubuntu-latest
            feature: io-uring
          - os: macos-latest
            feature: sync
          - os: macos-latest
            feature: tokio
          - os: macos-latest
            feature: mmap
          - os: windows-latest
            feature: sync
          - os: windows-latest
            feature: tokio
          - os: windows-latest
            feature: mmap
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Test feature
        run: cargo test --no-default-features --features ${{ matrix.feature }} --all-targets
