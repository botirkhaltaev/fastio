name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to crates.io"
        required: true
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Package and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@1.93

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy all features
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test all features
        run: cargo test --all-features

      - name: Check MSRV build
        run: cargo +1.93 check --all-targets --all-features

      - name: Check critical feature combinations
        run: |
          cargo check --no-default-features --all-targets
          cargo check --no-default-features --features sync --all-targets
          cargo check --no-default-features --features tokio --all-targets
          cargo check --no-default-features --features mmap --all-targets

      - name: Dry-run publish
        run: cargo publish --dry-run --locked

      - name: Verify package contents
        run: cargo package --locked --list

      - name: Publish crate
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
